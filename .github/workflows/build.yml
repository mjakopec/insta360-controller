name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Jura, O=JuraApp, C=HR" \
            -storepass android123 -keypass android123

      - name: Build Release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: juras-app
          path: android/app/build/outputs/apk/release/app-release.apk
