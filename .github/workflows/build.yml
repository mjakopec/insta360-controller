name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Allow HTTP traffic to camera
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">192.168.42.1</domain>
              </domain-config>
          </network-security-config>
          EOF
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' android/app/src/main/AndroidManifest.xml

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Jura, O=JuraApp, C=HR" \
            -storepass android123 -keypass android123

      - name: Build Release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android123

      - name: Find APK
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: juras-app
          path: android/app/build/outputs/apk/**/*.apk
